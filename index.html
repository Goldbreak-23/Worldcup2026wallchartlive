html{font-size:12px;}
body{background:#07091a;color:#e2e8f0;font-family:Inter,sans-serif;min-width:1500px;overflow-x:auto;}
:root{

#hdr{background:linear-gradient(180deg,#0d1830,#07091a);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;}
#hdr h1{font-family:"Bebas Neue",cursive;font-size:32px;color:var(--gold);letter-spacing:3px;line-height:1;}
#hdr .sub{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.badge{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px;}
.bl{background:var(--red);color:#fff;animation:pulse 1.8s infinite;}
.bs{background:var(--blue);color:#fff;}

#sbar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--dim);}
#ast{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;}
.aok{background:rgba(34,197,94,.2);color:var(--green);}
.aer{background:rgba(239,68,68,.2);color:var(--red);}
.ald{background:rgba(248,196,64,.2);color:var(--gold);}
#rbtn{background:var(--s2);border:1px solid var(--b2);color:var(--dim);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-family:Inter,sans-serif;}
#rbtn:hover{border-color:var(--gold);color:var(--gold);}
#lu{color:var(--green);}
.leg{display:flex;gap:10px;align-items:center;}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim);}
.ld{width:6px;height:6px;border-radius:50%;}
#tabs{display:flex;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--b1);}
.tab{padding:8px 16px;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:Inter,sans-serif;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.sec{display:none;}.sec.on{display:block;}
#wall{display:grid;grid-template-columns:210px 1fr 210px;padding:10px 6px;gap:0;align-items:start;}
.gcol{display:flex;flex-direction:column;gap:7px;}
.gc{background:var(--panel);border:1px solid var(--b1);border-radius:6px;overflow:hidden;}
.gh{display:flex;align-items:center;gap:7px;background:var(--s2);padding:4px 8px;border-bottom:1px solid var(--b1);}
.gl{font-family:"Bebas Neue",cursive;font-size:20px;color:var(--gold);line-height:1;width:18px;}
.gt{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--dim);}
.st{width:100%;border-collapse:collapse;}
.st th{font-size:7.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:3px 5px;text-align:right;}
.st th:first-child{text-align:left;}
.st td{padding:3px 5px;text-align:right;font-size:9.5px;border-bottom:1px solid rgba(255,255,255,.03);}
.st td:first-child{text-align:left;}
.st tr:last-child td{border-bottom:none;}
.tc{display:flex;align-items:center;gap:4px;}
.tp{font-size:8px;color:var(--muted);font-weight:600;width:10px;flex-shrink:0;}
.tf{font-size:12px;flex-shrink:0;}
.tn{font-weight:600;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px;}
.pts{font-family:"Roboto Mono",monospace;font-weight:700;color:var(--gold);font-size:10px;}
.rw{background:rgba(34,197,94,.09);}
.rr{background:rgba(59,130,246,.09);}
.rb{background:rgba(168,85,247,.09);}
.rx{background:rgba(239,68,68,.06);}

.fi{display:flex;align-items:center;padding:2px 6px;gap:3px;border-bottom:1px solid rgba(255,255,255,.025);font-size:8.5px;}

.fd{color:var(--muted);width:32px;flex-shrink:0;font-size:8px;}
.fh{font-weight:600;flex:1;text-align:right;font-size:8.5px;}

.sl{font-family:"Bebas Neue",cursive;font-size:12px;letter-spacing:1px;color:var(--muted);padding:3px 2px;}
.sl.ac{color:var(--gold);}

.bcol{display:flex;flex-direction:column;justify-content:space-around;padding:2px 3px;}
.bm{background:var(--s1);border:1px solid var(--b1);border-radius:5px;overflow:hidden;margin:2px 0;}

.bt:last-child{border-bottom:none;}

.bt.tbd{color:var(--muted);font-style:italic;font-weight:400;font-size:9px;}
.bf{font-size:11px;flex-shrink:0;}
.bn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9.5px;}

.fcol{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:4px;}
.fc{border:2px solid var(--gold);border-radius:7px;overflow:hidden;width:100%;background:var(--s1);}
.fc .bmh{background:var(--gold);color:#07091a;font-weight:700;}
.tc2{border:1px solid var(--b2);border-radius:5px;overflow:hidden;width:100%;background:var(--s1);margin-top:5px;}
.tl{font-size:8.5px;color:var(--dim);text-align:center;padding:3px;border-bottom:1px solid var(--b1);background:var(--s2);font-weight:600;}
#sch{padding:14px 18px;}
.srt{font-family:"Bebas Neue",cursive;font-size:20px;letter-spacing:2px;color:var(--gold);border-bottom:1px solid var(--b1);padding-bottom:5px;margin:14px 0 8px;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:7px;}

const SC = {1:'rw',2:'rr',3:'rb',x:'rx'};

function renderGroups() {
  const leftEl  = document.getElementById('lg');
  const rightEl = document.getElementById('rg');
  const left  = ['A','B','C','D','E','F'];
  const right = ['G','H','I','J','K','L'];
  leftEl.innerHTML  = left.map(l  => groupCard(l)).join('');
  rightEl.innerHTML = right.map(l => groupCard(l)).join('');
}

function groupCard(letter) {
  const g = GROUPS[letter];
  const rows = g.teams.map((t,i) => {
    const gd = t.gf - t.ga;
    return `<tr class="${SC[t.s]}">
      <td><div class="tc"><span class="tp">${i+1}</span><span class="tf">${t.f}</span><span class="tn">${t.n}</span></div></td>
      <td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td style="color:${gd>0?'var(--green)':gd<0?'var(--red)':'var(--muted)'}">${gd>0?'+'+gd:gd}</td>
      <td class="pts">${t.pts}</td>
    </tr>`;
  }).join('');

  const fixRows = g.fx.map(f => `
    <div class="fi">
      <span class="fd">${f.d}</span>
      <span class="fh">${f.h}</span>
      <span class="fs">${f.hs}-${f.as}</span>
      <span class="fa">${f.a}</span>
    </div>`).join('');

  return `<div class="gc">
    <div class="gh"><div class="gl">${letter}</div><div class="gt">GROUP ${letter}</div></div>
    <table class="st">
      <thead><tr>
        <th style="text-align:left">Team</th><th>W</th><th>D</th><th>L</th>
        <th>GD</th><th style="color:var(--gold)">Pts</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="fl">${fixRows}</div>
  </div>`;
}

function renderBracket() {
  const r32L = R32.slice(0,8), r32R = R32.slice(8,16);
  const r16L = R16.slice(0,4), r16R = R16.slice(4,8);

  function bmCard(m) {
    if (!m) return tbdCard();
    const played = m.st === 'FT' || m.st === 'FT-P';
    const live   = m.st === 'LIVE' || m.st === 'HT';
    const isPK   = m.st === 'FT-P';
    const hw = played && m.win === m.h;
    const aw = played && m.win === m.a;
    const hTbd = !m.h || m.h.startsWith('W');
    const aTbd = !m.a || m.a.startsWith('W');
    return `<div class="bm${live?' live-m':''}">
      <div class="bmh">
        <span>${m.d||'TBD'}</span>
        <span style="color:${live?'var(--green)':played?'var(--dim)':'var(--muted)'}">${live?'🔴 LIVE':played?'FT':'Upcoming'}</span>
      </div>
      <div class="bt ${hw?'win':hTbd?'tbd':''}">
        <span class="bf">${fl(m.h)}</span>
        <span class="bn">${hTbd?'TBD':m.h}</span>
        <span class="bsc">${played?m.hs:''}</span>
      </div>
      <div class="bt ${aw?'win':aTbd?'tbd':''}">
        <span class="bf">${fl(m.a)}</span>
        <span class="bn">${aTbd?'TBD':m.a}</span>
        <span class="bsc">${played?m.as:''}</span>
      </div>
      ${isPK?`<div style="font-size:7.5px;color:#f97316;padding:1px 6px;background:rgba(249,115,22,.1)">${m.note}</div>`:''}
    </div>`;
  }

  function tbdCard() {
    return `<div class="bm">
      <div class="bmh"><span>TBD</span><span>—</span></div>
      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>
      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>
    </div>`;
  }

  function col(arr, total, spacing) {
    let h = '';
    for (let i=0;i<total;i++) h += `<div style="margin:${spacing}px 0">${arr[i]?bmCard(arr[i]):tbdCard()}</div>`;
    return `<div class="bcol">${h}</div>`;
  }

  const finalCol = `<div class="bcol fcol">
    <div style="font-size:28px;text-align:center">🏆</div>
    <div style="font-family:Bebas Neue,cursive;font-size:20px;letter-spacing:2px;color:var(--gold);text-align:center">FINAL</div>

      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>

      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>
    </div>
  </div>`;

  document.getElementById('bbody').innerHTML =

// LIVE SCORES via Netlify serverless function
// Calls /.netlify/functions/api (proxies football-data.org)
// Auto-refreshes: 60s if live, 5min otherwise
// ═══════════════════════════════════════════════════════════

const FD_NAME = {
  'Mexico':'Mexico','South Africa':'South Africa','Korea Republic':'S. Korea',
  'Czech Republic':'Czechia','Czechia':'Czechia',
  'Switzerland':'Switzerland','Canada':'Canada',
  'Bosnia and Herzegovina':'Bosnia & H','Qatar':'Qatar',
  'Brazil':'Brazil','Morocco':'Morocco','Scotland':'Scotland','Haiti':'Haiti',
  'United States':'USA','Australia':'Australia','Paraguay':'Paraguay',
  'Turkiye':'Türkiye','Turkey':'Türkiye',
  'Germany':'Germany',"Cote d'Ivoire":'Ivory Coast','Ivory Coast':'Ivory Coast',
  'Ecuador':'Ecuador','Netherlands':'Netherlands','Japan':'Japan',
  'Sweden':'Sweden','Tunisia':'Tunisia','Belgium':'Belgium','Egypt':'Egypt',
  'Iran':'Iran','New Zealand':'New Zealand','Spain':'Spain',
  'Cabo Verde':'Cape Verde','Cape Verde':'Cape Verde',
  'Saudi Arabia':'Saudi Arabia','Uruguay':'Uruguay',
  'France':'France','Norway':'Norway','Senegal':'Senegal','Iraq':'Iraq',
  'Argentina':'Argentina','Austria':'Austria','Algeria':'Algeria','Jordan':'Jordan',
  'Colombia':'Colombia','Portugal':'Portugal',
  'Congo DR':'DR Congo','DR Congo':'DR Congo',
  'Uzbekistan':'Uzbekistan','England':'England','Croatia':'Croatia',
  'Ghana':'Ghana','Panama':'Panama',
  'Curacao':'Curaçao',
};

let liveTimer = null;

function normName(n){ return FD_NAME[n] || n; }

async function checkLive() {
  const ast = document.getElementById('ast');
  ast.className = 'ald';
  ast.textContent = '⏳ FETCHING…';

  try {
    const res = await fetch('/.netlify/functions/api');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const apiMatches = data.matches || [];

    let hasLive = false;
    let changed = false;

    apiMatches.forEach(m => {
      const home = normName(m.home);
      const away = normName(m.away);
      const played = m.status === 'FINISHED';
      const live   = m.status === 'IN_PLAY' || m.status === 'PAUSED' || m.status === 'HALFTIME';
      if (live) hasLive = true;
      if (!played && !live) return;

      // Update R32 or R16
      for (const arr of [R32, R16]) {
        const idx = arr.findIndex(x =>
          (normName(x.h) === home || normName(x.a) === home ||
           normName(x.h) === away || normName(x.a) === away)
        );
        if (idx > -1 && (arr[idx].st === 'upcoming' || live)) {
          arr[idx].hs = m.hs;
          arr[idx].as = m.as;
          arr[idx].st = live ? 'LIVE' : m.penHome !== null ? 'FT-P' : 'FT';
          if (played) {
            if (m.penHome !== null) {
              arr[idx].win = m.penHome > m.penAway ? home : away;
              arr[idx].note = (m.penHome > m.penAway ? home : away) + ' win ' + m.penHome + '-' + m.penAway + ' pens';
            } else {
              arr[idx].win = m.hs > m.as ? home : away;
            }
          }
          changed = true;
        }
      }
    });

    if (changed) { renderBracket(); renderSchedule(); }

    ast.className = 'aok';
    ast.textContent = hasLive ? '🔴 LIVE' : '✓ LIVE DATA';
    document.getElementById('lu').textContent = new Date().toLocaleTimeString();
    document.getElementById('stg').textContent = hasLive ? 'MATCHES LIVE' : 'ROUND OF 32';

    if (liveTimer) clearTimeout(liveTimer);
    liveTimer = setTimeout(checkLive, hasLive ? 60000 : 300000);

  } catch(e) {
    console.warn('Live fetch failed:', e.message);
    ast.className = 'aer';
    ast.textContent = '⚠ OFFLINE';
    if (liveTimer) clearTimeout(liveTimer);
    liveTimer = setTimeout(checkLive, 120000);
  }
}

function showTab(id, btn) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id+'-sec').classList.add('on');
  btn.classList.add('on');
}

// Render verified data instantly, then fetch live
renderGroups();
renderBracket();
renderSchedule();
checkLive();
