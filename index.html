<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Live Wall Chart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:12px;}
body{background:#07091a;color:#e2e8f0;font-family:Inter,sans-serif;min-width:1500px;overflow-x:auto;}
:root{
  --bg:#07091a;--panel:#0d1225;--s1:#111827;--s2:#1a2235;
  --b1:#1e2d47;--b2:#263347;
  --gold:#f0c040;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#a855f7;
  --dim:#7a8fa8;--muted:#3a4a60;
}

/* HEADER */
#hdr{background:linear-gradient(180deg,#0d1830,#07091a);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;}
#hdr h1{font-family:"Bebas Neue",cursive;font-size:32px;color:var(--gold);letter-spacing:3px;line-height:1;}
#hdr .sub{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.badge{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px;}
.bl{background:var(--red);color:#fff;animation:pulse 1.8s infinite;}
.bs{background:var(--blue);color:#fff;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
#sbar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--dim);}
#ast{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;}
.aok{background:rgba(34,197,94,.2);color:var(--green);}
.aer{background:rgba(239,68,68,.2);color:var(--red);}
.ald{background:rgba(248,196,64,.2);color:var(--gold);}
#rbtn{background:var(--s2);border:1px solid var(--b2);color:var(--dim);padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-family:Inter,sans-serif;}
#rbtn:hover{border-color:var(--gold);color:var(--gold);}
#lu{color:var(--green);}

/* LEGEND */
.leg{display:flex;gap:10px;align-items:center;}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim);}
.ld{width:6px;height:6px;border-radius:50%;}

/* TABS */
#tabs{display:flex;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--b1);}
.tab{padding:8px 16px;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:Inter,sans-serif;transition:.2s;}
.tab:hover{color:#e2e8f0;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* SECTIONS */
.sec{display:none;}.sec.on{display:block;}

/* WALL */
#wall{display:grid;grid-template-columns:210px 1fr 210px;padding:10px 6px;gap:0;align-items:start;}

/* GROUPS */
.gcol{display:flex;flex-direction:column;gap:7px;}
.gc{background:var(--panel);border:1px solid var(--b1);border-radius:6px;overflow:hidden;}
.gh{display:flex;align-items:center;gap:7px;background:var(--s2);padding:4px 8px;border-bottom:1px solid var(--b1);}
.gl{font-family:"Bebas Neue",cursive;font-size:20px;color:var(--gold);line-height:1;width:18px;}
.gt{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--dim);}
.st{width:100%;border-collapse:collapse;}
.st th{font-size:7.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:3px 5px;text-align:right;}
.st th:first-child{text-align:left;}
.st td{padding:3px 5px;text-align:right;font-size:9.5px;border-bottom:1px solid rgba(255,255,255,.03);}
.st td:first-child{text-align:left;}
.st tr:last-child td{border-bottom:none;}
.tc{display:flex;align-items:center;gap:4px;}
.tp{font-size:8px;color:var(--muted);font-weight:600;width:10px;flex-shrink:0;}
.tf{font-size:12px;flex-shrink:0;}
.tn{font-weight:600;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px;}
.pts{font-family:"Roboto Mono",monospace;font-weight:700;color:var(--gold);font-size:10px;}
.rw{background:rgba(34,197,94,.09);}
.rr{background:rgba(59,130,246,.09);}
.rb{background:rgba(168,85,247,.09);}
.rx{background:rgba(239,68,68,.06);}
.fl{padding:3px 0 2px;}
.fi{display:flex;align-items:center;padding:2px 6px;gap:3px;border-bottom:1px solid rgba(255,255,255,.025);font-size:8.5px;}
.fi:last-child{border-bottom:none;}
.fd{color:var(--muted);width:32px;flex-shrink:0;font-size:8px;}
.fh{font-weight:600;flex:1;text-align:right;white-space:nowrap;overflow:hidden;font-size:8.5px;}
.fa{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;font-size:8.5px;}
.fs{font-family:"Roboto Mono",monospace;font-weight:700;font-size:9.5px;background:var(--s2);padding:1px 4px;border-radius:2px;min-width:34px;text-align:center;flex-shrink:0;}
.fs.upc{color:var(--muted);font-size:7.5px;}
.fs.live{color:var(--green);animation:pulse 1.5s infinite;}

/* BRACKET */
#brc{padding:0 4px;}
.slabs{display:grid;grid-template-columns:repeat(9,1fr);text-align:center;padding-bottom:7px;border-bottom:1px solid var(--b1);margin-bottom:7px;}
.sl{font-family:"Bebas Neue",cursive;font-size:12px;letter-spacing:1px;color:var(--muted);padding:3px 2px;}
.sl.ac{color:var(--gold);}
.bbody{display:grid;grid-template-columns:repeat(9,1fr);align-items:stretch;}
.bcol{display:flex;flex-direction:column;justify-content:space-around;padding:2px 3px;}
.bm{background:var(--s1);border:1px solid var(--b1);border-radius:5px;overflow:hidden;margin:2px 0;flex-shrink:0;}
.bm:hover{border-color:var(--gold);}
.bm.live-m{border-color:var(--green);box-shadow:0 0 5px rgba(34,197,94,.25);}
.bmh{font-size:7.5px;color:var(--muted);padding:2px 6px;background:var(--s2);border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;}
.bt{display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid var(--b1);font-size:9.5px;font-weight:600;min-width:0;}
.bt:last-child{border-bottom:none;}
.bt.win{background:rgba(34,197,94,.12);color:var(--green);}
.bt.tbd{color:var(--muted);font-style:italic;font-weight:400;font-size:9px;}
.bf{font-size:11px;flex-shrink:0;}
.bn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9.5px;}
.bsc{font-family:"Roboto Mono",monospace;font-weight:700;font-size:11px;min-width:12px;text-align:right;flex-shrink:0;}

/* FINAL */
.fcol{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:4px;}
.fc{border:2px solid var(--gold);border-radius:7px;overflow:hidden;width:100%;background:var(--s1);}
.fc .bmh{background:var(--gold);color:#07091a;font-weight:700;}
.tc2{border:1px solid var(--b2);border-radius:5px;overflow:hidden;width:100%;background:var(--s1);margin-top:5px;}
.tl{font-size:8.5px;color:var(--dim);text-align:center;padding:3px;border-bottom:1px solid var(--b1);background:var(--s2);font-weight:600;letter-spacing:.5px;}

/* SCHEDULE */
#sch{padding:14px 18px;}
.srt{font-family:"Bebas Neue",cursive;font-size:20px;letter-spacing:2px;color:var(--gold);border-bottom:1px solid var(--b1);padding-bottom:5px;margin:14px 0 8px;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:7px;}
.sm{background:var(--panel);border:1px solid var(--b1);border-radius:5px;padding:7px 9px;}
.sm.pl{border-color:rgba(34,197,94,.22);}
.sm.up{border-color:rgba(59,130,246,.18);}
.sm.lv{border-color:var(--green);box-shadow:0 0 6px rgba(34,197,94,.18);}
.sm-meta{display:flex;justify-content:space-between;font-size:8.5px;color:var(--muted);margin-bottom:5px;}
.sm-teams{display:flex;align-items:center;gap:5px;}
.sm-t{display:flex;align-items:center;gap:3px;font-weight:600;font-size:10px;flex:1;}
.sm-t.aw{flex-direction:row-reverse;}
.sm-sc{font-family:"Roboto Mono",monospace;font-weight:700;font-size:13px;background:var(--s2);padding:2px 7px;border-radius:3px;min-width:48px;text-align:center;flex-shrink:0;}
.sm-sc.upc{font-size:9px;color:var(--muted);}
.sm-sc.lv{color:var(--green);animation:pulse 1.5s infinite;}

/* LOADING */
#load{position:fixed;inset:0;background:rgba(7,9,26,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
#load.off{display:none;}
.spin{width:36px;height:36px;border:3px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#lmsg{color:var(--dim);font-size:11px;}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><p id="lmsg">Fetching live World Cup 2026 data…</p></div>

<div id="hdr">
  <span style="font-size:20px">🇺🇸🇨🇦🇲🇽</span>
  <div><h1>FIFA World Cup 2026™</h1><div class="sub">Jun 11 – Jul 19 · 48 Teams · 104 Matches · USA / Canada / Mexico</div></div>
  <div class="badge bl">⚡ LIVE</div>
  <div id="stg" class="badge bs">LOADING…</div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:var(--green)"></div>Winner</div>
    <div class="li"><div class="ld" style="background:var(--blue)"></div>Runner-up</div>
    <div class="li"><div class="ld" style="background:var(--purple)"></div>Best 3rd</div>
    <div class="li"><div class="ld" style="background:var(--red)"></div>Eliminated</div>
  </div>
  <div id="sbar">
    <span id="ast" class="ald">⏳ CONNECTING</span>
    <span>Updated: <span id="lu">—</span></span>
    <button id="rbtn" onclick="init()">↻ Refresh</button>
  </div>
</div>

<div id="tabs">
  <button class="tab on" onclick="showTab('wall',this)">🏟 Wall Chart</button>
  <button class="tab" onclick="showTab('sch',this)">📅 All Fixtures</button>
</div>

<div id="wall-sec" class="sec on">
  <div id="wall">
    <div class="gcol" id="lg"></div>
    <div id="brc">
      <div class="slabs">
        <div class="sl">R32</div><div class="sl">R16</div><div class="sl">QF</div><div class="sl">SF</div>
        <div class="sl ac">🏆</div>
        <div class="sl">SF</div><div class="sl">QF</div><div class="sl">R16</div><div class="sl">R32</div>
      </div>
      <div class="bbody" id="bbody"></div>
    </div>
    <div class="gcol" id="rg"></div>
  </div>
</div>

<div id="sch-sec" class="sec"><div id="sch"></div></div>

<script>
// ═══════════════════════════════════════════════════
// DATA SOURCE — openfootball raw GitHub JSON
// No API key. No auth. GitHub raw always has CORS headers.
// Updated by maintainers throughout the tournament.
// ═══════════════════════════════════════════════════
const URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const REFRESH_LIVE = 90000;   // 90s when live matches detected
const REFRESH_IDLE = 300000;  // 5min otherwise

// ═══════════════════════════════════════════════════
// FLAG MAP
// ═══════════════════════════════════════════════════
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Korea Republic':'🇰🇷',
  'Czech Republic':'🇨🇿','Czechia':'🇨🇿',
  'Switzerland':'🇨🇭','Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Bosnia & Hz':'🇧🇦',
  'Qatar':'🇶🇦','Brazil':'🇧🇷','Morocco':'🇲🇦','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹',
  'United States':'🇺🇸','USA':'🇺🇸','Australia':'🇦🇺','Paraguay':'🇵🇾',
  'Türkiye':'🇹🇷','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Ivory Coast':'🇨🇮','Cote d\'Ivoire':'🇨🇮','Ecuador':'🇪🇨','Curaçao':'🇨🇼',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cabo Verde':'🇨🇻','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Norway':'🇳🇴','Senegal':'🇸🇳','Iraq':'🇮🇶',
  'Argentina':'🇦🇷','Austria':'🇦🇹','Algeria':'🇩🇿','Jordan':'🇯🇴',
  'Colombia':'🇨🇴','Portugal':'🇵🇹','DR Congo':'🇨🇩','Congo DR':'🇨🇩',
  'Uzbekistan':'🇺🇿','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
};
const fl = n => FLAGS[n] || '🏳';

// Short display names
const SHORT = {
  'Bosnia and Herzegovina':'Bosnia & Hz','Korea Republic':'S. Korea',
  'Czech Republic':'Czechia','United States':'USA',
  'Cote d\'Ivoire':'Ivory Coast','Congo DR':'DR Congo',
  'Cabo Verde':'Cape Verde','Turkey':'Türkiye',
};
const sn = n => SHORT[n] || n;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let matches = [];
let timer = null;

// ═══════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════
async function init() {
  setStatus('ald', '⏳ FETCHING');
  document.getElementById('load').classList.remove('off');
  document.getElementById('lmsg').textContent = 'Fetching live data from openfootball…';

  try {
    const res = await fetch(URL + '?t=' + Date.now()); // cache-bust
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    matches = data.matches || [];

    render();

    setStatus('aok', '✓ LIVE');
    document.getElementById('lu').textContent = new Date().toLocaleTimeString();

    const hasLive = matches.some(isLive);
    document.getElementById('stg').textContent = currentStage();

    if (timer) clearTimeout(timer);
    timer = setTimeout(init, hasLive ? REFRESH_LIVE : REFRESH_IDLE);

  } catch(e) {
    console.error('Fetch failed:', e);
    setStatus('aer', '⚠ OFFLINE');
    document.getElementById('lu').textContent = 'Retrying in 60s';
    if (timer) clearTimeout(timer);
    timer = setTimeout(init, 60000);
  }

  document.getElementById('load').classList.add('off');
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const isPlayed = m => m.score && m.score.ft;
const isLive   = m => m.score && m.score.et === undefined && !m.score.ft && m.score.ht;

function currentStage() {
  const ko = matches.filter(m => !m.group);
  if (!ko.length) return 'GROUP STAGE';
  const played = ko.filter(isPlayed);
  if (!played.length) return 'ROUND OF 32';
  const rounds = [...new Set(played.map(m => m.round))];
  const last = rounds[rounds.length-1];
  return last || 'KNOCKOUT';
}

function setStatus(cls, txt) {
  const el = document.getElementById('ast');
  el.className = cls;
  el.textContent = txt;
}

// Build group standings from match data
function buildStandings(groupName) {
  const gm = matches.filter(m => m.group === groupName && isPlayed(m));
  const teams = {};
  gm.forEach(m => {
    [m.team1, m.team2].forEach(t => {
      if (!teams[t]) teams[t] = {n:t,f:fl(t),p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
    });
    const [g1,g2] = m.score.ft;
    teams[m.team1].p++; teams[m.team1].gf+=g1; teams[m.team1].ga+=g2;
    teams[m.team2].p++; teams[m.team2].gf+=g2; teams[m.team2].ga+=g1;
    if (g1>g2) { teams[m.team1].w++; teams[m.team1].pts+=3; teams[m.team2].l++; }
    else if (g2>g1) { teams[m.team2].w++; teams[m.team2].pts+=3; teams[m.team1].l++; }
    else { teams[m.team1].d++; teams[m.team1].pts++; teams[m.team2].d++; teams[m.team2].pts++; }
  });
  return Object.values(teams).sort((a,b)=>
    b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf
  );
}

// ═══════════════════════════════════════════════════
// RENDER GROUPS
// ═══════════════════════════════════════════════════
function render() {
  renderGroups();
  renderBracket();
  renderSchedule();
}

function renderGroups() {
  const groups = {};
  matches.filter(m => m.group).forEach(m => {
    if (!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(m);
  });

  const letters = Object.keys(groups).sort();
  const left = letters.slice(0,6);
  const right = letters.slice(6,12);

  document.getElementById('lg').innerHTML = left.map(g => groupCard(g, groups[g])).join('');
  document.getElementById('rg').innerHTML = right.map(g => groupCard(g, groups[g])).join('');
}

function groupCard(groupName, gmatches) {
  const letter = groupName.replace('Group ','');
  const table = buildStandings(groupName);
  const allPlayed = table.length >= 4 && table.every(t => t.p >= 3);

  // determine which teams qualified (simplified: top 2 auto, 3rd maybe)
  const rowCls = (i) => {
    if (!allPlayed) return '';
    return ['rw','rr','rb','rx'][i] || 'rx';
  };

  const rows = table.map((t,i) => {
    const gd = t.gf-t.ga;
    return `<tr class="${rowCls(i)}">
      <td><div class="tc"><span class="tp">${i+1}</span><span class="tf">${t.f}</span><span class="tn">${sn(t.n)}</span></div></td>
      <td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td style="color:${gd>0?'var(--green)':gd<0?'var(--red)':'var(--muted)'}">${gd>0?'+'+gd:gd}</td>
      <td class="pts">${t.pts}</td>
    </tr>`;
  }).join('');

  // if no table yet (group not started), show placeholder teams from first match
  const allTeams = [...new Set(gmatches.flatMap(m=>[m.team1,m.team2]))];
  const placeholderRows = allTeams.map((t,i) => `<tr>
    <td><div class="tc"><span class="tp">${i+1}</span><span class="tf">${fl(t)}</span><span class="tn">${sn(t)}</span></div></td>
    <td>0</td><td>0</td><td>0</td><td style="color:var(--muted)">0</td><td class="pts">0</td>
  </tr>`).join('');

  const fixRows = gmatches.map(m => {
    const played = isPlayed(m);
    const live = isLive(m);
    const d = new Date(m.date).toLocaleDateString('en-GB',{month:'short',day:'numeric'});
    const hs = played ? m.score.ft[0] : live ? m.score.ht[0] : '';
    const as_ = played ? m.score.ft[1] : live ? m.score.ht[1] : '';
    return `<div class="fi">
      <span class="fd">${d}</span>
      <span class="fh">${sn(m.team1)}</span>
      <span class="fs${live?' live':played?'':'upc'}">${played||live?hs+'-'+as_:'vs'}</span>
      <span class="fa">${sn(m.team2)}</span>
    </div>`;
  }).join('');

  return `<div class="gc">
    <div class="gh"><div class="gl">${letter}</div><div class="gt">GROUP ${letter}</div></div>
    <table class="st">
      <thead><tr>
        <th style="text-align:left">Team</th><th>W</th><th>D</th><th>L</th><th>GD</th>
        <th style="color:var(--gold)">Pts</th>
      </tr></thead>
      <tbody>${table.length ? rows : placeholderRows}</tbody>
    </table>
    <div class="fl">${fixRows}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// RENDER BRACKET
// ═══════════════════════════════════════════════════
function renderBracket() {
  const ko = matches.filter(m => !m.group);

  // openfootball uses round names like "Round of 32", "Round of 16", "Quarter-finals", "Semi-finals", "Final"
  const byRound = r => ko.filter(m => m.round === r);
  const r32 = byRound('Round of 32');
  const r16 = byRound('Round of 16');
  const qf  = byRound('Quarter-finals');
  const sf  = byRound('Semi-finals');
  const fin = byRound('Final');
  const tp  = byRound('Third place');

  const r32L = r32.slice(0,8), r32R = r32.slice(8,16);
  const r16L = r16.slice(0,4), r16R = r16.slice(4,8);
  const qfL  = qf.slice(0,2),  qfR  = qf.slice(2,4);
  const sfL  = sf.slice(0,1),  sfR  = sf.slice(1,2);
  const fmatch = fin[0];
  const tpmatch = tp[0];

  function bmCard(m) {
    if (!m) return tbdCard();
    const played = isPlayed(m);
    const live   = isLive(m);
    const d = new Date(m.date).toLocaleDateString('en-GB',{month:'short',day:'numeric'});
    const hs = played ? m.score.ft[0] : live ? m.score.ht[0] : '';
    const as_ = played ? m.score.ft[1] : live ? m.score.ht[1] : '';
    const hw = played && m.score.ft[0] > m.score.ft[1];
    const aw = played && m.score.ft[1] > m.score.ft[0];
    const isTbd1 = !played && !live && m.team1.match(/^[0-9WL]/);
    const isTbd2 = !played && !live && m.team2.match(/^[0-9WL]/);
    return `<div class="bm${live?' live-m':''}" >
      <div class="bmh"><span>${d}</span><span style="color:${live?'var(--green)':played?'var(--dim)':'var(--muted)'}">${live?'🔴 LIVE':played?'FT':'Upcoming'}</span></div>
      <div class="bt ${hw?'win':isTbd1?'tbd':''}">
        <span class="bf">${isTbd1?'🏳':fl(m.team1)}</span>
        <span class="bn">${isTbd1?m.team1:sn(m.team1)}</span>
        <span class="bsc">${played||live?hs:''}</span>
      </div>
      <div class="bt ${aw?'win':isTbd2?'tbd':''}">
        <span class="bf">${isTbd2?'🏳':fl(m.team2)}</span>
        <span class="bn">${isTbd2?m.team2:sn(m.team2)}</span>
        <span class="bsc">${played||live?as_:''}</span>
      </div>
    </div>`;
  }

  function tbdCard(label) {
    return `<div class="bm">
      <div class="bmh"><span>${label||'TBD'}</span><span>—</span></div>
      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>
      <div class="bt tbd"><span class="bf">🏳</span><span class="bn">TBD</span><span class="bsc"></span></div>
    </div>`;
  }

  function col(arr, total, spacing, flex='1') {
    let h = '';
    for (let i=0; i<total; i++) {
      h += `<div style="margin:${spacing}px 0">${arr[i] ? bmCard(arr[i]) : tbdCard()}</div>`;
    }
    return `<div class="bcol" style="flex:${flex}">${h}</div>`;
  }

  // Final column
  const fp = fmatch && isPlayed(fmatch);
  const fh = fmatch && fp ? fmatch.score.ft[0] : '';
  const fa = fmatch && fp ? fmatch.score.ft[1] : '';
  const fd = fmatch ? new Date(fmatch.date).toLocaleDateString('en-GB',{month:'short',day:'numeric'}) : 'Jul 19';
  const tpp = tpmatch && isPlayed(tpmatch);

  const finalCol = `<div class="bcol fcol" style="flex:1.2">
    <div style="font-size:28px;text-align:center">🏆</div>
    <div style="font-family:Bebas Neue,cursive;font-size:20px;letter-spacing:2px;color:var(--gold);text-align:center">FINAL</div>
    <div style="font-size:8.5px;color:var(--dim);text-align:center;line-height:1.6">July 19 · 3pm ET<br>MetLife Stadium, NJ</div>
    <div class="fc">
      <div class="bmh" style="background:var(--gold);color:#07091a;font-weight:700">
        <span>${fd} · MetLife</span><span>${fp?'FT':'TBD'}</span>
      </div>
      <div class="bt ${fp&&fh>fa?'win':!fmatch||!fmatch.team1?'tbd':''}" >
        <span class="bf">${fmatch?fl(fmatch.team1):'🏳'}</span>
        <span class="bn">${fmatch?sn(fmatch.team1):'TBD'}</span>
        <span class="bsc">${fp?fh:''}</span>
      </div>
      <div class="bt ${fp&&fa>fh?'win':!fmatch||!fmatch.team2?'tbd':''}" >
        <span class="bf">${fmatch?fl(fmatch.team2):'🏳'}</span>
        <span class="bn">${fmatch?sn(fmatch.team2):'TBD'}</span>
        <span class="bsc">${fp?fa:''}</span>
      </div>
    </div>
    <div class="tc2">
      <div class="tl">3RD PLACE · Jul 18 · Miami</div>
      <div class="bt ${tpp&&tpmatch.score.ft[0]>tpmatch.score.ft[1]?'win':'tbd'}">
        <span class="bf">${tpmatch?fl(tpmatch.team1):'🏳'}</span>
        <span class="bn">${tpmatch?sn(tpmatch.team1):'TBD'}</span>
        <span class="bsc">${tpp?tpmatch.score.ft[0]:''}</span>
      </div>
      <div class="bt ${tpp&&tpmatch.score.ft[1]>tpmatch.score.ft[0]?'win':'tbd'}">
        <span class="bf">${tpmatch?fl(tpmatch.team2):'🏳'}</span>
        <span class="bn">${tpmatch?sn(tpmatch.team2):'TBD'}</span>
        <span class="bsc">${tpp?tpmatch.score.ft[1]:''}</span>
      </div>
    </div>
  </div>`;

  document.getElementById('bbody').innerHTML =
    col(r32L,8,2,'1.3') + col(r16L,4,22) + col(qfL,2,64) + col(sfL,1,148) +
    finalCol +
    col(sfR,1,148) + col(qfR,2,64) + col(r16R,4,22) + col(r32R,8,2,'1.3');
}

// ═══════════════════════════════════════════════════
// RENDER SCHEDULE
// ═══════════════════════════════════════════════════
function renderSchedule() {
  const stageOrder = ['Matchday 1','Matchday 2','Matchday 3','Round of 32','Round of 16','Quarter-finals','Semi-finals','Third place','Final'];
  const stageLabel = {
    'Matchday 1':'⚽ Group Stage — Matchday 1',
    'Matchday 2':'⚽ Group Stage — Matchday 2',
    'Matchday 3':'⚽ Group Stage — Matchday 3',
    'Round of 32':'🥊 Round of 32',
    'Round of 16':'⚔️ Round of 16',
    'Quarter-finals':'⚡ Quarter-finals',
    'Semi-finals':'🔥 Semi-finals',
    'Third place':'🥉 3rd Place Play-off',
    'Final':'🏆 Final'
  };

  const grouped = {};
  matches.forEach(m => {
    const r = m.round || 'Unknown';
    if (!grouped[r]) grouped[r] = [];
    grouped[r].push(m);
  });

  let html = '';
  stageOrder.forEach(stage => {
    const ms = (grouped[stage]||[]).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if (!ms.length) return;
    html += `<div class="srt">${stageLabel[stage]||stage}</div><div class="sg">`;
    ms.forEach(m => {
      const played = isPlayed(m);
      const live   = isLive(m);
      const d = new Date(m.date).toLocaleDateString('en-GB',{month:'short',day:'numeric'});
      const hs = played ? m.score.ft[0] : live ? m.score.ht[0] : '';
      const as_ = played ? m.score.ft[1] : live ? m.score.ht[1] : '';
      html += `<div class="sm ${live?'lv':played?'pl':'up'}">
        <div class="sm-meta"><span>${d}${m.ground?' · '+m.ground:''}</span><span style="color:${live?'var(--green)':'inherit'}">${live?'🔴 LIVE':played?'FT':''}</span></div>
        <div class="sm-teams">
          <div class="sm-t"><span>${fl(m.team1)}</span><span>${sn(m.team1)}</span></div>
          <div class="sm-sc ${live?'lv':played?'':'upc'}">${played||live?hs+' – '+as_:'<span style="font-size:9px;color:var(--muted)">vs</span>'}</div>
          <div class="sm-t aw"><span>${fl(m.team2)}</span><span>${sn(m.team2)}</span></div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('sch').innerHTML = html;
}

// ═══════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════
function showTab(id, btn) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id+'-sec').classList.add('on');
  btn.classList.add('on');
}

// ═══════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════
init();
</script>
